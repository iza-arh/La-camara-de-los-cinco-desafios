<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 3: La Evidencia del Explorador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center min-vh-100">

    <div class="container text-center">
        <h2 class="mb-4 text-primary">Nivel 3: La Evidencia del Explorador</h2>
        
        <div id="panelEstado" class="alert alert-dark text-info border-info fw-bold" role="alert">
            Estado: Sistema en espera. Encienda la cámara para continuar.
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-4">
                <h4 class="text-secondary">Cámara en Vivo</h4>
                <div class="p-2 border border-primary rounded bg-black">
                    <video id="video-camara" autoplay playsinline class="w-100" style="min-height: 259px;"></video>
                </div>
                <button id="btnIniciar" class="btn btn-primary mt-3 w-100 fw-bold">1. Acceder a la Cámara</button>
            </div>

            <div class="col-md-6 mb-4">
                <h4 class="text-secondary">Fotografía Capturada</h4>
                <div class="p-2 border border-success rounded bg-secondary d-flex justify-content-center align-items-center" style="max-width: 265px; margin: 0 auto;">
                    <canvas id="canvasFoto" class="d-none"></canvas>
                    <img id="img-resultado" class="w-100 d-none" alt="Evidencia capturada" />
                </div>
                <button id="btnCapturar" class="btn btn-success mt-3 w-100 fw-bold" disabled>2. Capturar y Enviar</button>

                <div>
                    <button id="btnEnviar" class="btn btn-success mt-3 w-100 fw-bold d-none">Pasar al Nivel 4 -></button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app-level3.js"></script>
</body>
</html>
