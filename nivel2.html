<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Inteligente - Nivel 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card bg-secondary text-light shadow-lg border-danger">
                    <div class="card-header border-danger d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 text-danger">Terminal de Acceso: Nivel 2 [CARTOGRAFÍA]</h4>
                        <span class="badge bg-danger">Protocolo: 15%</span>
                    </div>
                    <div class="card-body p-4">
                        <div class="row">
                            <div class="col-lg-8 mb-3">
                                <div class="canvas-container bg-dark rounded border border-danger p-1">
                                    <canvas id="mapCanvas" width="600" height="400" class="w-100"></canvas>
                                </div>
                            </div>

                            <div class="col-lg-4">
                                <p class="small mb-4">Sistemas de navegación corruptos. Reconstruya el mapa táctico
                                    utilizando las coordenadas obtenidas del Nivel 1.</p>

                                <div class="d-grid gap-2">
                                    <button id="btnDrawMap" class="btn btn-outline-danger">1. Cargar Mapa Base</button>
                                    <button id="btnDrawMarker" class="btn btn-outline-danger" disabled>2. Marcar
                                        Posición Actual</button>
                                    <button id="btnDrawShapes" class="btn btn-outline-danger" disabled>3. Identificar
                                        Estructuras</button>
                                </div>

                                <div id="feedback" class="mt-4 alert alert-dark text-danger border-danger small">
                                    Esperando entrada del cartógrafo...
                                </div>

                                <button id="nextLevelBtn" class="btn btn-success w-100 mt-3 d-none">
                                    Ir al Nivel 3 ->
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app-level2.js"></script>
</body>

</html>
